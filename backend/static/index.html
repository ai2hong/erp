<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAPE DOG ERP</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }

/* ── Login Modal ── */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 1000; display: flex; align-items: center; justify-content: center; }
.modal { background: #16213e; border-radius: 12px; padding: 32px; width: 360px; }
.modal h2 { color: #0f3460; margin-bottom: 16px; text-align: center; color: #e94560; }
.modal input { width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 1px solid #333; border-radius: 6px; background: #0f3460; color: #fff; font-size: 14px; }
.modal button { width: 100%; padding: 12px; background: #e94560; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
.modal button:hover { background: #c73652; }
.modal .error { color: #ff6b6b; font-size: 13px; margin-bottom: 8px; }

/* ── Confirm Modal ── */
.confirm-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 2000; display: flex; align-items: center; justify-content: center; }
.confirm-box { background: #16213e; border-radius: 12px; padding: 28px; width: 420px; border: 2px solid #e94560; }
.confirm-box h3 { color: #e94560; margin-bottom: 12px; }
.confirm-box .mismatch-detail { background: #0f3460; padding: 12px; border-radius: 6px; margin: 12px 0; font-size: 14px; line-height: 1.8; }
.confirm-box .btn-row { display: flex; gap: 10px; margin-top: 16px; }
.confirm-box .btn-row button { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; }
.btn-cancel { background: #333; color: #ccc; }
.btn-confirm { background: #e94560; color: #fff; }

/* ── Header ── */
header { background: #16213e; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e94560; }
header h1 { font-size: 20px; color: #e94560; }
header .user-info { font-size: 13px; color: #aaa; }
header .user-info span { color: #e94560; font-weight: bold; }

/* ── Layout ── */
.container { display: grid; grid-template-columns: 280px 1fr 320px; height: calc(100vh - 50px); }

/* ── Sidebar (categories) ── */
.sidebar { background: #16213e; padding: 12px; overflow-y: auto; border-right: 1px solid #333; }
.sidebar h3 { color: #e94560; margin-bottom: 10px; font-size: 14px; }
.cat-btn { width: 100%; padding: 9px 12px; margin-bottom: 4px; background: #0f3460; border: 1px solid #333; border-radius: 6px; color: #ccc; cursor: pointer; text-align: left; font-size: 13px; }
.cat-btn:hover, .cat-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
.search-box { width: 100%; padding: 8px 10px; margin-bottom: 10px; background: #0f3460; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 13px; }

/* ── Main (product grid) ── */
.main { padding: 12px; overflow-y: auto; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.product-card { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 12px; cursor: pointer; transition: .15s; }
.product-card:hover { border-color: #e94560; transform: translateY(-2px); }
.product-card .name { font-size: 13px; font-weight: bold; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-card .price { color: #e94560; font-size: 14px; font-weight: bold; }
.product-card .cat { color: #888; font-size: 11px; margin-top: 4px; }
.product-card.excl { border-left: 3px solid #ffa502; }
.pagination { display: flex; justify-content: center; gap: 6px; margin-top: 12px; padding: 8px; }
.pagination button { padding: 6px 12px; background: #0f3460; border: 1px solid #333; border-radius: 4px; color: #ccc; cursor: pointer; }
.pagination button:hover, .pagination button.active { background: #e94560; color: #fff; }
.pagination .info { padding: 6px; color: #888; font-size: 13px; }

/* ── Cart panel ── */
.cart-panel { background: #16213e; border-left: 1px solid #333; display: flex; flex-direction: column; }
.cart-header { padding: 12px; border-bottom: 1px solid #333; }
.cart-header h3 { color: #e94560; font-size: 14px; }
.cart-items { flex: 1; overflow-y: auto; padding: 8px; }
.cart-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; margin-bottom: 4px; background: #0f3460; border-radius: 6px; font-size: 13px; }
.cart-item .item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 8px; }
.cart-item .qty-ctrl { display: flex; align-items: center; gap: 4px; }
.cart-item .qty-ctrl button { width: 24px; height: 24px; border: none; border-radius: 4px; background: #333; color: #fff; cursor: pointer; font-size: 14px; }
.cart-item .qty-ctrl span { min-width: 20px; text-align: center; }
.cart-item .item-price { min-width: 70px; text-align: right; color: #e94560; font-weight: bold; }
.cart-item .remove-btn { margin-left: 6px; color: #ff6b6b; cursor: pointer; font-size: 16px; }

/* ── Cart footer ── */
.cart-footer { padding: 12px; border-top: 1px solid #333; }
.cart-footer .row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
.cart-footer .total { font-size: 18px; font-weight: bold; color: #e94560; }
.cart-footer select, .cart-footer input { width: 100%; padding: 8px; margin-bottom: 6px; background: #0f3460; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 13px; }
.customer-row { display: flex; gap: 6px; margin-bottom: 6px; }
.customer-row input { flex: 1; }
.customer-row button { padding: 8px 12px; background: #0f3460; border: 1px solid #333; border-radius: 6px; color: #ccc; cursor: pointer; font-size: 13px; white-space: nowrap; }
.customer-info { background: #0f3460; padding: 6px 10px; border-radius: 6px; margin-bottom: 6px; font-size: 12px; color: #aaa; }
.customer-info .name { color: #e94560; font-weight: bold; }
.save-btn { width: 100%; padding: 14px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px; }
.save-btn:hover { background: #c73652; }
.save-btn:disabled { background: #555; cursor: not-allowed; }

/* ── Toast ── */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #27ae60; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 3000; animation: fadeInOut 3s ease; }
.toast.error { background: #e74c3c; }
@keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 10% { opacity: 1; transform: translateX(-50%) translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; } }
</style>
</head>
<body>

<!-- Login Modal -->
<div id="loginModal" class="modal-overlay">
  <div class="modal">
    <h2>VAPE DOG ERP</h2>
    <div id="loginError" class="error" style="display:none"></div>
    <input id="loginId" type="text" placeholder="아이디" value="owner_admin">
    <input id="loginPw" type="password" placeholder="비밀번호">
    <button onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- Price Mismatch Confirm Modal -->
<div id="confirmModal" class="confirm-overlay" style="display:none">
  <div class="confirm-box">
    <h3>금액 불일치 확인 필요</h3>
    <div id="mismatchDetail" class="mismatch-detail"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeConfirm()">취소</button>
      <button class="btn-confirm" onclick="confirmSave()">백엔드 기준으로 저장</button>
    </div>
  </div>
</div>

<header>
  <h1>VAPE DOG ERP</h1>
  <div class="user-info" id="userInfo" style="display:none">
    <span id="userName"></span> (<span id="userRole"></span>) | <a href="#" onclick="doLogout()" style="color:#e94560">로그아웃</a>
  </div>
</header>

<div class="container">
  <!-- Sidebar: Categories -->
  <div class="sidebar">
    <h3>상품 분류</h3>
    <input class="search-box" id="searchBox" type="text" placeholder="상품명 검색..." oninput="searchProducts()">
    <div id="categoryList"></div>
  </div>

  <!-- Main: Product Grid -->
  <div class="main">
    <div class="product-grid" id="productGrid"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- Cart Panel -->
  <div class="cart-panel">
    <div class="cart-header"><h3>장바구니</h3></div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <!-- Customer lookup -->
      <div class="customer-row">
        <input id="customerSearch" type="text" placeholder="고객 이름/전화번호">
        <button onclick="searchCustomer()">고객 조회</button>
      </div>
      <div id="customerInfo" class="customer-info" style="display:none"></div>

      <!-- Channel & Payment -->
      <select id="channelSelect">
        <option value="매장">매장</option>
        <option value="배달">배달</option>
        <option value="택배">택배</option>
      </select>
      <select id="paymentMethod">
        <option value="이체">이체</option>
        <option value="현금">현금</option>
        <option value="카드">카드</option>
        <option value="마일리지">마일리지</option>
      </select>
      <input id="mileageUsed" type="number" placeholder="적립금 사용액" value="0" min="0">

      <!-- Discount -->
      <div style="display:flex;gap:6px;margin-bottom:6px">
        <input id="discountAmount" type="number" placeholder="할인금액" value="0" min="0" style="flex:1" oninput="renderCart()">
        <input id="discountReason" type="text" placeholder="할인 사유" style="flex:2">
      </div>

      <!-- Staff memo -->
      <input id="staffMemo" type="text" placeholder="직원 메모 (선택)" style="margin-bottom:6px">

      <!-- Adult verification -->
      <label style="display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="adultVerified" checked> 성인 인증 확인
      </label>

      <!-- Totals -->
      <div class="row"><span>소계</span><span id="subtotalDisplay">0원</span></div>
      <div class="row" id="discountRow" style="display:none;color:#ffa502"><span>할인</span><span id="discountDisplay">0원</span></div>
      <div class="row total"><span>합계</span><span id="totalDisplay">0원</span></div>
      <div class="row" id="earnRow" style="display:none;color:#2ecc71;font-size:12px"><span>예상 적립</span><span id="earnDisplay">0원</span></div>

      <button class="save-btn" id="saveBtn" onclick="saveTransaction()" disabled>저장 확정</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// State
// ══════════════════════════════════════════════
const API = window.location.port === '8000' ? '' : 'http://localhost:8000';
let token = localStorage.getItem('erp_token') || '';
let currentUser = null;
let products = [];
let cart = []; // [{product, quantity}]
let selectedCustomer = null;
let currentCategory = null;
let currentPage = 1;
let totalPages = 1;
let searchQuery = '';
let pendingTxResponse = null; // for confirm modal

// Category display names
const CATEGORIES = [
  '전체',
  '입호흡 이벤트', '입호흡 일반', '입호흡 일반(할인제외)',
  '폐호흡 이벤트', '폐호흡 일반', '폐호흡 일반(할인제외)',
  '입호흡 기기', '폐호흡 기기', '입호흡 기기(단일가)', '폐호흡 기기(단일가)',
  '입호흡 코일', '입호흡 코일(고가)', '폐호흡 코일', '폐호흡 코일(고가)',
  '악세사리'
];

// Bundle price constants (same as price_engine)
const BUNDLE_3_BASE = 50000;
const BUNDLE_3_NORMAL = 5000;
const BUNDLE_2_폐 = 45000;
const EVENT_입_PRICE = 20000;
const EVENT_폐_PRICE = 25000;

// ══════════════════════════════════════════════
// API helpers
// ══════════════════════════════════════════════
function headers() { return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }; }

async function api(method, path, body) {
  const opts = { method, headers: headers() };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const data = await r.json();
  if (!r.ok) throw { status: r.status, detail: data.detail || JSON.stringify(data) };
  return data;
}

function showToast(msg, isError) {
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function formatPrice(n) { return (n || 0).toLocaleString() + '원'; }

// ══════════════════════════════════════════════
// Auth
// ══════════════════════════════════════════════
async function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginError');
  try {
    const data = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login_id: id, password: pw })
    }).then(r => r.json());
    if (data.access_token) {
      token = data.access_token;
      localStorage.setItem('erp_token', token);
      localStorage.setItem('erp_refresh', data.refresh_token);
      currentUser = { name: data.name, role: data.role, store_id: data.store_id };
      document.getElementById('loginModal').style.display = 'none';
      document.getElementById('userInfo').style.display = 'block';
      document.getElementById('userName').textContent = data.name;
      document.getElementById('userRole').textContent = data.role;
      initApp();
    } else {
      errEl.textContent = data.detail || '로그인 실패';
      errEl.style.display = 'block';
    }
  } catch (e) {
    errEl.textContent = '서버 연결 실패';
    errEl.style.display = 'block';
  }
}

function doLogout() {
  token = '';
  localStorage.removeItem('erp_token');
  localStorage.removeItem('erp_refresh');
  currentUser = null;
  document.getElementById('loginModal').style.display = 'flex';
  document.getElementById('userInfo').style.display = 'none';
}

async function checkAuth() {
  if (!token) return false;
  try {
    const data = await api('GET', '/auth/me');
    currentUser = { name: data.name, role: data.role, store_id: data.store_id };
    document.getElementById('loginModal').style.display = 'none';
    document.getElementById('userInfo').style.display = 'block';
    document.getElementById('userName').textContent = data.name;
    document.getElementById('userRole').textContent = data.role;
    return true;
  } catch {
    token = '';
    return false;
  }
}

// ══════════════════════════════════════════════
// Products
// ══════════════════════════════════════════════
function renderCategories() {
  const el = document.getElementById('categoryList');
  el.innerHTML = CATEGORIES.map(cat => {
    const isActive = (cat === '전체' && !currentCategory) || cat === currentCategory;
    return `<button class="cat-btn ${isActive ? 'active' : ''}" onclick="selectCategory('${cat}')">${cat}</button>`;
  }).join('');
}

function selectCategory(cat) {
  currentCategory = cat === '전체' ? null : cat;
  currentPage = 1;
  renderCategories();
  loadProducts();
}

async function loadProducts() {
  const params = new URLSearchParams({ page: currentPage, size: 30 });
  if (currentCategory) params.set('category', currentCategory);
  if (searchQuery) params.set('search', searchQuery);
  try {
    const data = await api('GET', `/products/?${params}`);
    products = data.items;
    totalPages = data.pages;
    renderProducts();
    renderPagination(data);
  } catch (e) {
    showToast('상품 로딩 실패: ' + (e.detail || e.message), true);
  }
}

function renderProducts() {
  const el = document.getElementById('productGrid');
  if (!products.length) {
    el.innerHTML = '<div style="color:#888;padding:20px;text-align:center">상품이 없습니다</div>';
    return;
  }
  el.innerHTML = products.map(p => `
    <div class="product-card ${p.is_excl ? 'excl' : ''}" onclick="addToCart(${p.id})">
      <div class="name" title="${p.name}">${p.name}</div>
      <div class="price">${formatPrice(p.normal_price)}</div>
      ${p.discount_price ? `<div style="color:#888;font-size:11px">연동: ${formatPrice(p.discount_price)}</div>` : ''}
      <div class="cat">${p.category}${p.is_excl ? ' [할인제외]' : ''}</div>
    </div>
  `).join('');
}

function renderPagination(data) {
  const el = document.getElementById('pagination');
  if (data.pages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  if (currentPage > 1) html += `<button onclick="goPage(${currentPage-1})">이전</button>`;
  const start = Math.max(1, currentPage - 3);
  const end = Math.min(data.pages, currentPage + 3);
  for (let i = start; i <= end; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (currentPage < data.pages) html += `<button onclick="goPage(${currentPage+1})">다음</button>`;
  html += `<span class="info">${data.total}개 중 ${(currentPage-1)*data.size+1}-${Math.min(currentPage*data.size,data.total)}</span>`;
  el.innerHTML = html;
}

function goPage(p) { currentPage = p; loadProducts(); }

let searchTimeout;
function searchProducts() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    searchQuery = document.getElementById('searchBox').value.trim();
    currentPage = 1;
    loadProducts();
  }, 300);
}

// ══════════════════════════════════════════════
// Cart
// ══════════════════════════════════════════════
function addToCart(productId) {
  const product = products.find(p => p.id === productId);
  if (!product) return;
  const existing = cart.find(c => c.product.id === productId);
  if (existing) {
    existing.quantity++;
  } else {
    cart.push({ product, quantity: 1 });
  }
  renderCart();
}

function updateQty(productId, delta) {
  const item = cart.find(c => c.product.id === productId);
  if (!item) return;
  item.quantity += delta;
  if (item.quantity <= 0) cart = cart.filter(c => c.product.id !== productId);
  renderCart();
}

function removeFromCart(productId) {
  cart = cart.filter(c => c.product.id !== productId);
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cartItems');
  if (!cart.length) {
    el.innerHTML = '<div style="color:#888;padding:20px;text-align:center">상품을 선택하세요</div>';
    document.getElementById('subtotalDisplay').textContent = '0원';
    document.getElementById('totalDisplay').textContent = '0원';
    document.getElementById('discountRow').style.display = 'none';
    document.getElementById('earnRow').style.display = 'none';
    document.getElementById('saveBtn').disabled = true;
    return;
  }

  el.innerHTML = cart.map(c => `
    <div class="cart-item">
      <div class="item-name" title="${c.product.name}">${c.product.name}</div>
      <div class="qty-ctrl">
        <button onclick="updateQty(${c.product.id},-1)">-</button>
        <span>${c.quantity}</span>
        <button onclick="updateQty(${c.product.id},1)">+</button>
      </div>
      <div class="item-price">${formatPrice(c.product.normal_price * c.quantity)}</div>
      <span class="remove-btn" onclick="removeFromCart(${c.product.id})">x</span>
    </div>
  `).join('');

  const calc = calcFrontendTotal();
  const mileage = parseInt(document.getElementById('mileageUsed').value) || 0;
  const discount = parseInt(document.getElementById('discountAmount').value) || 0;
  const total = Math.max(0, calc.subtotal - discount - mileage);
  document.getElementById('subtotalDisplay').textContent = formatPrice(calc.subtotal);
  document.getElementById('totalDisplay').textContent = formatPrice(total);

  // Show discount row
  const discountRow = document.getElementById('discountRow');
  if (discount > 0) {
    discountRow.style.display = 'flex';
    document.getElementById('discountDisplay').textContent = '-' + formatPrice(discount);
  } else {
    discountRow.style.display = 'none';
  }

  // Estimated mileage earn
  const payMethod = document.getElementById('paymentMethod').value;
  const cardAmount = payMethod === '카드' ? total : 0;
  const isHighPod = cart.some(c => ['입호흡 코일(고가)', '폐호흡 코일(고가)'].includes(c.product.category));
  const nature = calcPaymentNature(total, cardAmount, mileage);
  const earnEligible = !isHighPod && (nature === '현금이체' || nature === '현금이체_카드20이하');
  const earnRow = document.getElementById('earnRow');
  if (earnEligible && total > 0) {
    const earn = Math.floor(total * 0.01 / 10) * 10;
    earnRow.style.display = 'flex';
    document.getElementById('earnDisplay').textContent = '+' + formatPrice(earn);
  } else {
    earnRow.style.display = 'none';
  }

  document.getElementById('saveBtn').disabled = false;
}

function calcPaymentNature(total, cardAmount, mileageUsed) {
  if (total <= 0 && mileageUsed > 0) return '마일리지전액';
  if (cardAmount <= 0) return '현금이체';
  if (total > 0 && (cardAmount / total * 100) <= 20) return '현금이체_카드20이하';
  return '카드';
}

// ── Frontend price calculation (mirrors price_engine) ──
function calcFrontendTotal() {
  const EVENT_CATS_입 = ['입호흡 이벤트'];
  const EVENT_CATS_폐 = ['폐호흡 이벤트'];
  const NORMAL_CATS = ['입호흡 일반', '폐호흡 일반'];
  const EXCL_CATS = ['입호흡 일반(할인제외)', '폐호흡 일반(할인제외)'];
  const DEVICE_LINKED = ['입호흡 기기', '폐호흡 기기'];
  const DEVICE_FIXED = ['입호흡 기기(단일가)', '폐호흡 기기(단일가)'];

  let evt입 = 0, evt폐 = 0, normal = 0, exclTotal = 0, deviceTotal = 0, otherTotal = 0;

  for (const c of cart) {
    const cat = c.product.category;
    if (EXCL_CATS.includes(cat)) {
      exclTotal += c.product.normal_price * c.quantity;
    } else if (EVENT_CATS_입.includes(cat)) {
      evt입 += c.quantity;
    } else if (EVENT_CATS_폐.includes(cat)) {
      evt폐 += c.quantity;
    } else if (NORMAL_CATS.includes(cat)) {
      normal += c.quantity;
    } else if (DEVICE_LINKED.includes(cat)) {
      const dp = c.product.discount_price;
      const price = (dp && dp > 0 && dp < c.product.normal_price) ? dp : c.product.normal_price;
      deviceTotal += price * c.quantity;
    } else if (DEVICE_FIXED.includes(cat)) {
      deviceTotal += c.product.normal_price * c.quantity;
    } else {
      otherTotal += c.product.normal_price * c.quantity;
    }
  }

  // Bundle calculation
  let rem입 = evt입, rem폐 = evt폐, remNorm = normal;
  let bundleTotal = 0;

  // 3-bottle bundles
  while (rem입 + rem폐 + remNorm >= 3) {
    const use입 = Math.min(rem입, 3);
    const use폐 = Math.min(rem폐, 3 - use입);
    const evtUsed = use입 + use폐;
    const normUsed = Math.min(remNorm, 3 - evtUsed);
    if (evtUsed + normUsed < 3) break;
    bundleTotal += BUNDLE_3_BASE + BUNDLE_3_NORMAL * normUsed;
    rem입 -= use입;
    rem폐 -= use폐;
    remNorm -= normUsed;
  }

  // 2-bottle 폐이벤트 bundles
  while (rem폐 >= 2) {
    bundleTotal += BUNDLE_2_폐;
    rem폐 -= 2;
  }

  // Remaining individual
  bundleTotal += rem입 * EVENT_입_PRICE;
  bundleTotal += rem폐 * EVENT_폐_PRICE;

  // Remaining normal at full price
  let remainNormalTotal = 0;
  for (const c of cart) {
    if (NORMAL_CATS.includes(c.product.category)) {
      remainNormalTotal += c.product.normal_price * c.quantity;
    }
  }
  // Used normal in bundles
  const usedNormal = normal - remNorm;
  // Calculate remaining normal price
  let normalPrice = 0;
  let usedCount = 0;
  for (const c of cart) {
    if (NORMAL_CATS.includes(c.product.category)) {
      for (let i = 0; i < c.quantity; i++) {
        if (usedCount < usedNormal) {
          usedCount++;
        } else {
          normalPrice += c.product.normal_price;
        }
      }
    }
  }

  const subtotal = bundleTotal + normalPrice + exclTotal + deviceTotal + otherTotal;
  return { subtotal };
}

// ══════════════════════════════════════════════
// Customer
// ══════════════════════════════════════════════
async function searchCustomer() {
  const q = document.getElementById('customerSearch').value.trim();
  if (!q) return;
  try {
    const data = await api('GET', `/customers/?search=${encodeURIComponent(q)}`);
    const infoEl = document.getElementById('customerInfo');
    if (data.length === 0) {
      infoEl.innerHTML = '없는 고객입니다';
      infoEl.style.display = 'block';
      selectedCustomer = null;
    } else {
      const c = data[0];
      selectedCustomer = c;
      infoEl.innerHTML = `<span class="name">${c.name}</span> ${c.phone} | 적립금: ${formatPrice(c.mileage_balance)} | 방문: ${c.visit_count}회`;
      infoEl.style.display = 'block';
    }
  } catch (e) {
    showToast('고객 조회 실패', true);
  }
}

// ══════════════════════════════════════════════
// Save Transaction
// ══════════════════════════════════════════════
async function saveTransaction() {
  if (!cart.length) return;
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = '저장 중...';

  const mileageUsed = parseInt(document.getElementById('mileageUsed').value) || 0;
  const discountAmount = parseInt(document.getElementById('discountAmount').value) || 0;
  const discountReason = document.getElementById('discountReason').value.trim();
  const staffMemo = document.getElementById('staffMemo').value.trim();
  const adultVerified = document.getElementById('adultVerified').checked;
  const paymentMethod = document.getElementById('paymentMethod').value;
  const channel = document.getElementById('channelSelect').value;

  // Validate discount reason
  if (discountAmount > 0 && !discountReason) {
    showToast('할인 사유를 입력해주세요.', true);
    saveBtn.disabled = false;
    saveBtn.textContent = '저장 확정';
    return;
  }

  const frontCalc = calcFrontendTotal();
  const frontTotal = Math.max(0, frontCalc.subtotal - discountAmount - mileageUsed);

  const body = {
    channel,
    customer_id: selectedCustomer ? selectedCustomer.id : null,
    store_id: currentUser.store_id,
    lines: cart.map(c => ({ product_id: c.product.id, quantity: c.quantity })),
    payments: [{ method: paymentMethod, amount: frontTotal }],
    discount_amount: discountAmount,
    discount_reason: discountReason || null,
    mileage_used: mileageUsed,
    card_ratio_pct: paymentMethod === '카드' ? 100 : 0,
    adult_verified: adultVerified,
    staff_memo: staffMemo || null,
  };

  try {
    const result = await api('POST', '/transactions/', body);

    // Price mismatch check
    if (result.subtotal !== frontCalc.subtotal) {
      console.warn('Price mismatch detected:', {
        frontSubtotal: frontCalc.subtotal,
        backSubtotal: result.subtotal,
        cart: cart.map(c => ({ name: c.product.name, id: c.product.id, qty: c.quantity, cat: c.product.category }))
      });

      pendingTxResponse = result;
      const detail = document.getElementById('mismatchDetail');
      detail.innerHTML = `
        프론트 계산: ${formatPrice(frontCalc.subtotal)}<br>
        백엔드 계산: ${formatPrice(result.subtotal)}<br><br>
        <strong>장바구니 상세:</strong><br>
        ${cart.map(c => `- ${c.product.name} x${c.quantity} (${c.product.category})`).join('<br>')}
      `;
      document.getElementById('confirmModal').style.display = 'flex';
      saveBtn.disabled = false;
      saveBtn.textContent = '저장 확정';
      return;
    }

    // Success - prices match
    onSaveSuccess(result);
  } catch (e) {
    showToast('저장 실패: ' + (e.detail || '서버 오류'), true);
    saveBtn.disabled = false;
    saveBtn.textContent = '저장 확정';
  }
}

function onSaveSuccess(result) {
  let msg = `저장 완료 (${result.tx_number}) - ${formatPrice(result.total_amount)}`;
  if (result.mileage_earned > 0) msg += ` | 적립 ${formatPrice(result.mileage_earned)}`;
  showToast(msg);
  cart = [];
  selectedCustomer = null;
  document.getElementById('customerInfo').style.display = 'none';
  document.getElementById('customerSearch').value = '';
  document.getElementById('mileageUsed').value = '0';
  document.getElementById('discountAmount').value = '0';
  document.getElementById('discountReason').value = '';
  document.getElementById('staffMemo').value = '';
  document.getElementById('adultVerified').checked = true;
  renderCart();
  document.getElementById('saveBtn').textContent = '저장 확정';
}

function closeConfirm() {
  document.getElementById('confirmModal').style.display = 'none';
  pendingTxResponse = null;
}

function confirmSave() {
  document.getElementById('confirmModal').style.display = 'none';
  if (pendingTxResponse) {
    console.log('User confirmed save with backend price:', pendingTxResponse);
    onSaveSuccess(pendingTxResponse);
    pendingTxResponse = null;
  }
}

// ══════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════
async function initApp() {
  renderCategories();
  await loadProducts();
  document.getElementById('mileageUsed').addEventListener('input', renderCart);
  document.getElementById('paymentMethod').addEventListener('change', renderCart);
  document.getElementById('discountAmount').addEventListener('input', renderCart);
}

// Auto-login check
(async function() {
  if (await checkAuth()) {
    initApp();
  }
})();
</script>
